# ---- MySQL connection ----
# Update these to match your local WAMP/MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_pos_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
# update: creates/updates tables automatically from your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Logging ----
logging.level.org.springframework=INFO
logging.level.com.techshop.inventorypos=DEBUG
